steps:
  # 1. Build the image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_IMAGE_PATH', 
      '-f', 'Dockerfile', 
      '.'
    ]

  # 2. Push to IBM Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Login to IBM Container Registry
        docker login $_ICR_DOMAIN -u iamapikey -p $$IBM_CLOUD_API_KEY
        
        # Tag for IBM ICR
        docker tag $_IMAGE_PATH $_ICR_DOMAIN/$_ICR_NAMESPACE/$_REPO_NAME:latest
        
        # Push to IBM ICR
        docker push $_ICR_DOMAIN/$_ICR_NAMESPACE/$_REPO_NAME:latest
    secretEnv: ['IBM_CLOUD_API_KEY']

# Pull secrets from Secret Manager
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/IBM_CLOUD_API_KEY/versions/latest
    env: 'IBM_CLOUD_API_KEY'

images:
  - '$_IMAGE_PATH'
